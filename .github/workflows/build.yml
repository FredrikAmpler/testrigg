name: Build Tasmota Embedded
on: [workflow_dispatch, push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Preparing Tasmota
        run: |
          pip install platformio
          git clone --depth 1 https://github.com/arendst/Tasmota.git
          
          # 1. Skapa inbäddnings-modulen med Python
          python3 -c "
          import os
          with open('start.html', 'r', encoding='utf-8') as f: content = f.read()
          with open('Tasmota/tasmota/tasmota_xdrv_driver/xdrv_99_dashboard.ino', 'w', encoding='utf-8') as f:
              f.write('#ifdef USE_WEBSERVER\n')
              # Vi använder en unik marker 'DASH_HTML' för att inte krocka med tecken i din HTML
              f.write('const char dashboard_html[] PROGMEM = R\"DASH_HTML(' + content + ')DASH_HTML\";\n')
              f.write('void HandleDashboard() { Webserver->send_P(200, \"text/html\", dashboard_html); }\n')
              f.write('void DashInit() { Webserver->on(\"/start.html\", HandleDashboard); Webserver->on(\"/start\", HandleDashboard); }\n')
              f.write('#endif\n')
          "

          # 2. Tvinga Tasmota att registrera dashboarden i webbservern
          # Lägg till prototypen högst upp i webbserver-filen
          sed -i '1i void DashInit();' Tasmota/tasmota/tasmota_xdrv_driver/xdrv_01_9_webserver.ino
          # Skjut in anropet precis där alla andra web-handlers skapas
          sed -i '/XdrvXsnsCall(FUNC_WEB_ADD_HANDLER);/a \      DashInit();' Tasmota/tasmota/tasmota_xdrv_driver/xdrv_01_9_webserver.ino
          
          # 3. Konfigurera WiFi-stabilitet
          cat <<EOF > Tasmota/tasmota/user_config_override.h
          #ifndef _USER_CONFIG_OVERRIDE_H_
          #define _USER_CONFIG_OVERRIDE_H_
          #define WIFI_CONFIG_TOOL 5
          #endif
          EOF

      - name: Compilation
        run: |
          cd Tasmota
          pio run -e tasmota
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tasmota-embedded
          path: Tasmota/.pio/build/tasmota/firmware.bin
