<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borrtest Rig - Dashboard</title>
    <!-- Vi försöker ladda grafen, men dashboarden funkar även utan den -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js" onerror="console.warn('Graf-bibliotek kunde inte laddas (offline?)')"></script>
    <style>
        :root { --primary: #00d2ff; --secondary: #3a7bd5; --bg: #0f172a; --card-bg: rgba(30, 41, 59, 0.7); --text: #f8fafc; --accent: #f43f5e; --success: #10b981; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: var(--text); margin: 0; padding: 20px; min-height: 100vh; }
        .container { max-width: 1000px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; backdrop-filter: blur(10px); padding: 20px; border-radius: 16px; background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.1); }
        h1 { margin: 0; font-size: 1.5rem; color: var(--primary); }
        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; }
        .status-running { background: var(--success); color: white; box-shadow: 0 0 15px var(--success); }
        .status-stopped { background: var(--accent); color: white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; }
        .card h3 { margin: 0 0 10px 0; font-size: 0.9rem; color: #94a3b8; }
        .card .value { font-size: 2rem; font-weight: bold; }
        .card .unit { font-size: 1rem; color: #64748b; margin-left: 5px; }
        .main-content { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .chart-container { background: var(--card-bg); padding: 20px; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.1); height: 400px; position: relative; }
        .controls { background: var(--card-bg); padding: 20px; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-size: 0.8rem; color: #94a3b8; }
        input { width: 100%; padding: 10px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: all 0.2s; margin-bottom: 10px; }
        .btn-start { background: var(--success); color: white; }
        .btn-stop { background: var(--accent); color: white; }
        .btn-secondary { background: #334155; color: white; }
        .stats-table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        .stats-table td { padding: 8px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .stats-table .label { color: #94a3b8; font-size: 0.85rem; }
        .stats-table .val { text-align: right; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>Borrtest Rig</h1>
                <div id="connection-status" style="font-size: 0.7rem; color: #64748b;">Ansluter till pluggen...</div>
            </div>
            <div id="run-status-badge" class="status-badge status-stopped">Stoppad</div>
        </header>

        <div class="grid">
            <div class="card"><h3>Effekt</h3><div class="value" id="val-power">0<span class="unit">W</span></div></div>
            <div class="card"><h3>Spänning</h3><div class="value" id="val-voltage">0<span class="unit">V</span></div></div>
            <div class="card"><h3>Cykler</h3><div class="value" id="val-cycles">0</div></div>
            <div class="card"><h3>Toppeffekt</h3><div class="value" id="val-peak">0<span class="unit">W</span></div></div>
        </div>

        <div class="main-content">
            <div class="chart-container">
                <canvas id="powerChart"></canvas>
                <div id="offline-msg" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#64748b; text-align:center;">
                    Graf visas ej i offline-läge<br><small>(Kräver internet vid start)</small>
                </div>
            </div>
            <div class="controls">
                <h3>Inställningar</h3>
                <div class="input-group">
                    <label>Tid PÅ (sekunder)</label>
                    <input type="number" id="in-on" value="10">
                </div>
                <div class="input-group">
                    <label>Tid AV (sekunder)</label>
                    <input type="number" id="in-off" value="2">
                </div>
                <button class="btn btn-start" onclick="startTest()">STARTA TEST</button>
                <button class="btn btn-stop" onclick="stopTest()">STOPPA</button>
                <button class="btn btn-secondary" onclick="resetStats()">Nollställ Statistik</button>
                <button class="btn btn-secondary" onclick="exportCSV()">Exportera CSV</button>
            </div>
        </div>
    </div>

    <script>
        let chart;
        let dataPoints = [];
        let masterPeak = 0;
        
        // Avgör om vi kör direkt i pluggen eller som lokal fil
        function getApiBase() {
            if (window.location.protocol === "file:") {
                const ip = prompt("Skriv in pluggens IP-adress (t.ex. 192.168.1.130):", "192.168.1.130");
                return `http://${ip}/cm?cmnd=`;
            }
            return "/cm?cmnd="; // Relativ sökväg när vi kör inuti pluggen
        }

        const apiBase = getApiBase();

        function initChart() {
            if (typeof Chart === 'undefined') {
                document.getElementById('offline-msg').style.display = 'block';
                return;
            }
            const ctx = document.getElementById('powerChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{ label: 'Effekt (W)', data: [], borderColor: '#00d2ff', backgroundColor: 'rgba(0, 210, 255, 0.1)', borderWidth: 2, fill: true, tension: 0.4, pointRadius: 0 }]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } } }, plugins: { legend: { display: false } } }
            });
        }

        async function sendCmd(cmd) {
            try {
                const url = apiBase + encodeURIComponent(cmd);
                const resp = await fetch(url);
                if (!resp.ok) throw new Error("HTTP Fel " + resp.status);
                return await resp.json();
            } catch (e) {
                console.error("API Error:", e);
                document.getElementById('connection-status').innerText = "Anslutningsfel: " + e.message;
                return null;
            }
        }

        async function updateData() {
            const status = await sendCmd("Status 8");
            const mems = await sendCmd("Status 10");
            if (!status || !mems) return;

            const power = status.StatusSNS.ENERGY.Power || 0;
            const voltage = status.StatusSNS.ENERGY.Voltage || 0;
            const cycles = mems.StatusPRM.Mem4 || 0;
            const peak = mems.StatusPRM.Mem6 || 0;
            const isRunning = mems.StatusPRM.Mem3 == "1";

            document.getElementById('val-power').innerHTML = `${power}<span class="unit">W</span>`;
            document.getElementById('val-voltage').innerHTML = `${voltage}<span class="unit">V</span>`;
            document.getElementById('val-cycles').innerText = cycles;
            document.getElementById('val-peak').innerHTML = `${peak}<span class="unit">W</span>`;

            const badge = document.getElementById('run-status-badge');
            badge.innerText = isRunning ? "Körs" : "Stoppad";
            badge.className = isRunning ? "status-badge status-running" : "status-badge status-stopped";
            document.getElementById('connection-status').innerText = "Ansluten - " + new Date().toLocaleTimeString();

            if (chart && (isRunning || power > 0)) {
                const now = new Date();
                dataPoints.push({ t: now, v: power });
                chart.data.labels.push(now.toLocaleTimeString());
                chart.data.datasets[0].data.push(power);
                if (chart.data.labels.length > 100) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
                chart.update('none');
            }
        }

        async function startTest() {
            const onTime = document.getElementById('in-on').value;
            const offTime = document.getElementById('in-off').value;
            await sendCmd(`Backlog Mem1 ${onTime}; Mem2 ${offTime}; Mem3 1`);
        }

        async function stopTest() { await sendCmd("Mem3 0"); }
        async function resetStats() { if (confirm("Nollställ räknare?")) await sendCmd("Backlog Mem4 0; Mem6 0"); }

        function exportCSV() {
            let csv = "Timestamp,Power(W)\n";
            dataPoints.forEach(p => { csv += `${p.t.toISOString()},${p.v}\n`; });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `borrtest_${Date.now()}.csv`; a.click();
        }

        initChart();
        setInterval(updateData, 1000);
    </script>
</body>
</html>
