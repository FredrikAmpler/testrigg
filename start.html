<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borrtest Rig Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #00d2ff;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --accent: #f43f5e;
            --success: #10b981;
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: #0f172a;
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 16px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stats-layout {
            display: grid;
            grid-template-columns: 1fr 2.5fr 0.8fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card h3 {
            font-size: 0.7rem;
            color: #94a3b8;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stats-row-val {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 1.1rem;
        }

        .stats-row-val b {
            color: var(--primary);
        }

        .agg-table {
            display: grid;
            grid-template-columns: 40px 1fr 1fr 1fr;
            text-align: center;
            align-items: center;
        }

        .agg-h {
            font-size: 0.65rem;
            color: #94a3b8;
            padding-bottom: 8px;
            font-weight: bold;
        }

        .agg-label {
            color: #94a3b8;
            font-weight: bold;
            text-align: left;
        }

        .agg-v {
            font-size: 1.3rem;
            font-weight: 800;
            padding: 12px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .value-large {
            font-size: 3rem;
            font-weight: 900;
            color: var(--primary);
            margin: auto;
        }

        .main {
            display: grid;
            grid-template-columns: 1.8fr 1.2fr;
            gap: 20px;
        }

        .panel {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Toggle Switch Styling */
        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
        }

        .switch-label {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 54px;
            height: 28px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #334155;
            transition: .3s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 4px;
            bottom: 4px;
            background: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background: var(--success);
        }

        input:checked+.slider.loop-accent {
            background: var(--primary);
        }

        input:checked+.slider:before {
            transform: translateX(26px);
        }

        .time-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .time-inputs div {
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 10px;
            text-align: center;
        }

        input[type="number"] {
            width: 50px;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--primary);
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            background: #334155;
            color: white;
            transition: 0.2s;
            margin-top: 10px;
        }

        .btn:hover {
            background: #475569;
        }

        .chart-box {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 15px;
            height: 350px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Borrtest <span style="color:var(--primary)">Rig</span></h1>
            <div id="status" style="font-size: 0.8rem; color: #64748b;">Ansluter...</div>
        </header>

        <div class="stats-layout">
            <!-- Momentant -->
            <div class="card">
                <h3>Momentant</h3>
                <div style="margin-top: 25px;">
                    <div class="stats-row-val"><span class="agg-label">V</span> <b id="v-now">-</b></div>
                    <div class="stats-row-val"><span class="agg-label">A</span> <b id="a-now">-</b></div>
                    <div class="stats-row-val"><span class="agg-label">W</span> <b id="p-now">-</b></div>
                </div>
            </div>

            <!-- Aggregerat -->
            <div class="card">
                <h3>Aggregerat i perioden</h3>
                <div class="agg-table">
                    <div class="agg-h"></div>
                    <div class="agg-h">Max</div>
                    <div class="agg-h">Medel</div>
                    <div class="agg-h">Median</div>

                    <div class="agg-label">V</div>
                    <div id="v-max" class="agg-v">-</div>
                    <div id="v-avg" class="agg-v">-</div>
                    <div id="v-med" class="agg-v">-</div>

                    <div class="agg-label">A</div>
                    <div id="a-max" class="agg-v">-</div>
                    <div id="a-avg" class="agg-v">-</div>
                    <div id="a-med" class="agg-v">-</div>

                    <div class="agg-label">W</div>
                    <div id="p-max" class="agg-v">-</div>
                    <div id="p-avg" class="agg-v">-</div>
                    <div id="p-med" class="agg-v">-</div>
                </div>
            </div>

            <!-- Cykler -->
            <div class="card">
                <h3>Cykler</h3>
                <div id="cyc" class="value-large">0</div>
            </div>
        </div>

        <div class="main">
            <div class="chart-box"><canvas id="mainChart"></canvas></div>

            <div class="panel">
                <div class="control-row">
                    <span class="switch-label">Manuell på/av</span>
                    <label class="switch"><input type="checkbox" id="manual-sw" onchange="toggleManual()"><span
                            class="slider"></span></label>
                </div>

                <div class="control-row">
                    <span class="switch-label">Loop start/stopp</span>
                    <label class="switch"><input type="checkbox" id="loop-sw" onchange="toggleLoop()"><span
                            class="slider loop-accent"></span></label>
                </div>

                <div class="time-inputs">
                    <div><small>Kör (s)</small><br><input type="number" id="t-on" value="10"></div>
                    <div><small>Vila (s)</small><br><input type="number" id="t-off" value="2"></div>
                </div>

                <div class="time-inputs">
                    <div><small>Stoppgräns (W)</small><br><input type="number" id="t-limit" value="1000"></div>
                    <div><small>Tröghet (s)</small><br><input type="number" id="t-delay" value="1"></div>
                </div>

                <button class="btn" onclick="resetStats()">Nollställ räknare</button>
                <button class="btn" onclick="exportCSV()">Exportera CSV</button>
            </div>
        </div>
    </div>

    <script>
        let chart, p_pts = [], v_pts = [], a_pts = [], logs = [];
        const api = "/cm?cmnd=";

        function initChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [{ data: [], borderColor: '#00d2ff', backgroundColor: 'rgba(0,210,255,0.1)', fill: true, tension: 0.4, pointRadius: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } } }, plugins: { legend: { display: false } } }
            });
        }

        async function cmd(c) { try { return await (await fetch(api + encodeURIComponent(c))).json(); } catch (e) { return null; } }

        // Initial Load: Load Mem values from Tasmota
        async function loadSettings() {
            const mems = await cmd("Mem");
            if (mems) {
                if (mems.Mem1) document.getElementById('t-on').value = mems.Mem1;
                if (mems.Mem2) document.getElementById('t-off').value = mems.Mem2;
                if (mems.Mem3) document.getElementById('t-limit').value = mems.Mem3;
                if (mems.Mem4) document.getElementById('t-delay').value = mems.Mem4;
            }
        }

        async function update() {
            const [s8, s0, v1, v2] = await Promise.all([
                cmd("Status 8"),
                cmd("Status 0"),
                cmd("Var1"),
                cmd("Var2")
            ]);

            if (!s8 || !s0) return;

            const p = parseFloat(s8.StatusSNS.ENERGY.Power || 0);
            const v = parseFloat(s8.StatusSNS.ENERGY.Voltage || 0);
            const a = parseFloat(s8.StatusSNS.ENERGY.Current || 0);
            const c = v1 ? parseFloat(v1.Var1 || 0) : 0;
            const peak = v2 ? parseFloat(v2.Var2 || 0) : 0;

            // Momentant UI
            document.getElementById('v-now').innerText = v.toFixed(1) + "V";
            document.getElementById('a-now').innerText = a.toFixed(3) + "A";
            document.getElementById('p-now').innerText = p.toFixed(2) + "W";
            document.getElementById('cyc').innerText = Math.round(c);

            // Sync toggles from Tasmota state
            document.getElementById('manual-sw').checked = (s0.StatusSTS.POWER1 === "ON");
            document.getElementById('loop-sw').checked = (s0.StatusSTS.POWER3 === "ON");
            document.getElementById('status').innerText = "Uppdaterad: " + new Date().toLocaleTimeString();

            // Store logs for stats and CSV
            const isLooping = s0.StatusSTS.POWER3 === "ON";
            if (p > 1 || isLooping) {
                const now = new Date();
                logs.push({ t: now.toLocaleTimeString(), ts: now.toISOString(), v, a, p });
                p_pts.push(p); v_pts.push(v); a_pts.push(a);

                if (chart) {
                    chart.data.labels.push(""); chart.data.datasets[0].data.push(p);
                    if (chart.data.labels.length > 100) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
                    chart.update('none');
                }
                calc(peak);
            }
        }

        function getStats(arr) {
            if (!arr.length) return { max: 0, avg: 0, med: 0 };
            const max = Math.max(...arr);
            const avg = arr.reduce((a, b) => a + b) / arr.length;
            const s = [...arr].sort((a, b) => a - b);
            const med = s[Math.floor(arr.length / 2)];
            return { max, avg: Math.round(avg * 10) / 10, med };
        }

        function calc(tasmotaPeak) {
            const ps = getStats(p_pts);
            const vs = getStats(v_pts);
            const as = getStats(a_pts);

            const displayPeak = Math.max(tasmotaPeak, ps.max);

            document.getElementById('p-max').innerText = displayPeak.toFixed(2) + "W";
            document.getElementById('p-avg').innerText = ps.avg.toFixed(1) + "W";
            document.getElementById('p-med').innerText = ps.med.toFixed(1) + "W";

            document.getElementById('v-max').innerText = vs.max.toFixed(1) + "V";
            document.getElementById('v-avg').innerText = vs.avg.toFixed(1) + "V";
            document.getElementById('v-med').innerText = vs.med.toFixed(1) + "V";

            document.getElementById('a-max').innerText = as.max.toFixed(3) + "A";
            document.getElementById('a-avg').innerText = as.avg.toFixed(3) + "A";
            document.getElementById('a-med').innerText = as.med.toFixed(3) + "A";
        }

        async function toggleManual() {
            await cmd("Power1 TOGGLE");
        }

        async function toggleLoop() {
            if (document.getElementById('loop-sw').checked) {
                const on = document.getElementById('t-on').value;
                const off = document.getElementById('t-off').value;
                const limit = document.getElementById('t-limit').value;
                const delay = document.getElementById('t-delay').value;
                await cmd(`Backlog Mem1 ${on}; Mem2 ${off}; Mem3 ${limit}; Mem4 ${delay}; Power3 1`);
            } else {
                await cmd("Power3 0");
            }
        }

        async function resetStats() {
            if (confirm("Vill du nollställa alla räknare och el-data i pluggen?")) {
                await cmd("Power2 ON");
                p_pts = []; v_pts = []; a_pts = []; logs = [];
                if (chart) {
                    chart.data.labels = [];
                    chart.data.datasets[0].data = [];
                    chart.update();
                }
            }
        }

        function exportCSV() {
            let csv = "Timestamp,Voltage(V),Current(A),Power(W)\n";
            logs.forEach(l => {
                csv += `${l.ts},${l.v.toFixed(1)},${l.a.toFixed(3)},${l.p.toFixed(2)}\n`;
            });
            const a = document.createElement('a');
            a.href = window.URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
            a.download = `borrlogg_${new Date().getTime()}.csv`;
            a.click();
        }

        initChart();
        loadSettings();
        setInterval(update, 1000);
    </script>
</body>

</html>
